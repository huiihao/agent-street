<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Street</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <header id="top-bar">
    <h1>AGENT STREET</h1>
    <div id="controls">
      <button id="btn-start" class="pixel-btn">START</button>
      <button id="btn-stop" class="pixel-btn" disabled>STOP</button>
      <button id="btn-reset" class="pixel-btn">RESET</button>
    </div>
  </header>

  <div id="main-row">
    <section id="map-panel">
      <h2 class="panel-title">TOWN MAP</h2>
      <canvas id="town-canvas" width="560" height="392"></canvas>
    </section>

    <section id="center-panel">
      <div id="chart-area">
        <h2 class="panel-title">STOCK CHART</h2>
        <canvas id="chart-canvas" width="360" height="240"></canvas>
      </div>
      <div id="sentiment-bar-wrap">
        <span class="label">SENTIMENT</span>
        <div id="sentiment-track">
          <div id="sentiment-fill"></div>
        </div>
      </div>
      <div id="detail-area">
        <h2 class="panel-title">AGENT DETAIL</h2>
        <div id="agent-detail">
          <div style="padding:16px;color:#888;text-align:center">Click an agent on the map</div>
        </div>
      </div>
    </section>

    <section id="leader-panel">
      <h2 class="panel-title">LEADERS</h2>
      <canvas id="leader-canvas" width="200" height="336"></canvas>
    </section>
  </div>

  <section id="observer-panel">
    <h2 class="panel-title">OBSERVER REPORTS &nbsp;🔭📐🔮</h2>
    <div id="observer-reports">
      <div class="obs-placeholder">Observers are watching the town... Reports appear every ~20 ticks.</div>
    </div>
  </section>

  <section id="trade-feed-panel">
    <h2 class="panel-title">TRADE FEED</h2>
    <div id="trade-feed"></div>
  </section>

  <footer id="status-bar">
    <span id="st-world-time">--</span>
    <span id="st-tick">TICK 0</span>
    <span id="st-speed">⚡1x</span>
    <span id="st-status">● DISCONNECTED</span>
    <span id="st-sim">SIM: STOPPED</span>
  </footer>
</div>

<script src="js/rendering/pixel_art.js"></script>
<script src="js/ws_client.js"></script>
<script src="js/canvas/stock_chart.js"></script>
<script src="js/canvas/persona_grid.js"></script>
<script src="js/canvas/leaderboard.js"></script>
<script src="js/canvas/town_map.js"></script>
<script src="js/canvas/agent_detail.js"></script>
<script src="js/canvas/observer_reports.js"></script>
<script src="js/canvas/trade_feed.js"></script>
<script src="js/app.js"></script>
</body>
</html>
